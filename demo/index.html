<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lakaw — A* Pathfinding</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0b0e;
      --fg: #f4f4f5;
      --muted: #a1a1aa;
      --faint: #71717a;
      --line: #1e1f24;
      --card: #121318;
      --accent: #4ade80;
      --warm: #fb923c;
      --cool: #60a5fa;
      --rain: #818cf8;
      --visited: #3f3f46;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 720px; margin: 0 auto; }
    header { margin-bottom: 1.5rem; }
    h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-top: 0.25rem; }
    .controls {
      display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    button {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--fg);
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button.primary {
      background: var(--accent); color: var(--bg); border-color: var(--accent);
      font-weight: 600;
    }
    button.primary:hover { filter: brightness(1.1); color: var(--bg); }
    .stats {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      color: var(--muted); font-size: 0.8125rem;
      font-variant-numeric: tabular-nums;
    }
    .stats span strong { color: var(--fg); font-weight: 500; }
    .mode {
      display: inline-flex; gap: 0.25rem; background: var(--card);
      border: 1px solid var(--line); border-radius: 0.5rem; padding: 0.25rem;
    }
    .mode button {
      background: transparent; border: none; padding: 0.375rem 0.75rem;
      font-size: 0.8125rem; border-radius: 0.375rem;
    }
    .mode button.active { background: var(--line); color: var(--accent); }
    #grid { display: block; width: 100%; max-width: 720px; height: auto; }
    .legend {
      display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem;
      font-size: 0.75rem; color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: 0.375rem; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
    footer {
      margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--line);
      font-size: 0.75rem; color: var(--faint);
    }
    a { color: var(--muted); text-decoration: underline; }
    a:hover { color: var(--fg); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Lakaw</h1>
      <p class="subtitle">A* pathfinding on a grid — click to add walls, drag the nodes, run the search. The library is 1.4 KB of dependency-free TypeScript.</p>
    </header>

    <div class="controls">
      <button class="primary" id="run">▶ Run A*</button>
      <button id="clear">Clear walls</button>
      <button id="maze">Random maze</button>
      <div class="mode">
        <button data-mode="wall" class="active">Wall</button>
        <button data-mode="start">Start</button>
        <button data-mode="goal">Goal</button>
      </div>
    </div>

    <div class="stats" id="stats">
      <span>Cost: <strong id="stat-cost">—</strong></span>
      <span>Visited: <strong id="stat-visited">—</strong></span>
      <span>Iterations: <strong id="stat-iter">—</strong></span>
      <span>Path length: <strong id="stat-path">—</strong></span>
    </div>

    <svg id="grid" xmlns="http://www.w3.org/2000/svg"></svg>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background: var(--accent)"></div> Start</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--warm)"></div> Goal</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--line)"></div> Wall</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--visited)"></div> Visited</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--cool)"></div> Path</div>
    </div>

    <footer>
      Lakaw · Cebuano for "walk/go" · extracted from <a href="https://amping.app" target="_blank">Amping</a> transit router.
      <br><a href="https://github.com/kiergabelo/lakaw" target="_blank">source</a>
    </footer>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
